# =============================================================================
# Novarr — one-click stack
# =============================================================================
# Pulls the prebuilt image from GHCR (no local build) and runs everything it
# needs: the app (Octane serves PHP *and* static assets), a one-shot migration,
# the scheduler (which also drains the command queue), MySQL, Redis, and
# FlareSolverr for Cloudflare-protected scraping.
#
# Install:
#   curl -O https://raw.githubusercontent.com/RaihaX/novarr/master/docker-compose.oneclick.yml
#   docker compose -f docker-compose.oneclick.yml up -d
#
# Then open http://<host>/  (put HTTPS in front via a reverse proxy / Tailscale
# Serve to install it as a PWA). The DB/Redis ports are NOT published — they are
# only reachable inside this stack, so the default internal passwords are fine.
# =============================================================================

name: novarr

x-app-env: &app-env
  APP_NAME: Novarr
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://localhost          # change to your http(s) origin
  APP_TIMEZONE: UTC
  LOG_CHANNEL: stack
  LOG_LEVEL: warning
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: novarr
  DB_USERNAME: novarr
  DB_PASSWORD: novarr_secret         # internal-only (DB port is not published)
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: database
  QUEUE_FAILED_DRIVER: database-uuids
  OCTANE_SERVER: roadrunner
  FLARESOLVERR_URL: http://flaresolverr:8191/v1
  # Optional email (Resend) — leave blank to disable summary / Kindle mail:
  MAIL_MAILER: log
  # RESEND_KEY: ""
  # MAIL_FROM_ADDRESS: novarr@example.com

services:
  # One-shot: wait for MySQL, run migrations, then exit. Everything else waits
  # for this to finish so the schema is ready before the app/scheduler start.
  init:
    image: ghcr.io/raihax/novarr:latest
    environment: *app-env
    command: php artisan migrate --force
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/raihax/novarr:latest
    environment: *app-env
    # Ensure the public/storage symlink exists in this container, then serve.
    command: sh -c "php artisan storage:link --force >/dev/null 2>&1 || true; exec php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000"
    ports:
      - "80:8000"
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # schedule:work runs the cron tasks (TOC refresh, chapter downloads,
  # completion verify, summary email) AND drains the command queue each minute.
  scheduler:
    image: ghcr.io/raihax/novarr:latest
    environment: *app-env
    command: php artisan schedule:work
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: novarr
      MYSQL_USER: novarr
      MYSQL_PASSWORD: novarr_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
    restart: unless-stopped

volumes:
  mysql:
  redis:
  storage:
