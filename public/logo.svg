<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Book icon -->
  <g transform="translate(4, 4)">
    <!-- Back cover -->
    <rect x="2" y="3" width="22" height="28" rx="2" fill="#3b82f6" opacity="0.4"/>
    <!-- Front cover -->
    <rect x="5" y="1" width="22" height="28" rx="2" fill="#3b82f6"/>
    <!-- Spine highlight -->
    <rect x="5" y="1" width="3" height="28" rx="1" fill="#2563eb"/>
    <!-- Page lines -->
    <line x1="12" y1="8" x2="23" y2="8" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="12" y1="12" x2="23" y2="12" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="12" y1="16" x2="20" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Bookmark ribbon -->
    <path d="M20 1 L20 10 L22.5 8 L25 10 L25 1" fill="#f97316"/>
  </g>
  <!-- Text -->
  <text x="42" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="1.5" fill="#ffffff">NOVARR</text>
  <!-- Accent dot -->
  <circle cx="156" cy="26" r="3" fill="#3b82f6"/>
</svg>
